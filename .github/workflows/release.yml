name: Release

on:
  push:
    tags:
      - "v*"

env:
  FLUTTER_VERSION: "3.38.x"

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Create .env from example
        run: cp .env.example .env

      - name: Check formatting
        run: dart format lib test --set-exit-if-changed

      - name: Analyze code
        run: flutter analyze --no-fatal-infos

      - name: Run tests
        run: flutter test --exclude-tags=golden

  build_and_deploy:
    name: Build & Deploy APK
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get tag name and commit message
        id: tag_info
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          echo "TAG_NAME=${TAG}" >> $GITHUB_OUTPUT
          echo "COMMIT_SHA=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
          # Extract version and build number from tag (v1.2.3 -> 1.2.3, v1.2.3+4 -> 1.2.3+4)
          VERSION="${TAG#v}"
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT
          # Get the tag annotation or commit message
          git fetch --depth=1 origin +refs/tags/*:refs/tags/*
          TAG_MESSAGE=$(git tag -l --format='%(contents)' ${GITHUB_REF#refs/tags/} | head -20)
          if [ -z "$TAG_MESSAGE" ]; then
            TAG_MESSAGE=$(git log -1 --pretty=%B)
          fi
          # Save multiline message to file
          echo "$TAG_MESSAGE" > tag_message.txt
          echo "Generated tag message file"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Create .env from example
        run: cp .env.example .env

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/upload-keystore.jks

      - name: Create key.properties
        run: |
          echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" > android/key.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> android/key.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> android/key.properties
          echo "storeFile=upload-keystore.jks" >> android/key.properties

      - name: Set version from tag
        run: |
          sed -i "s/^version: .*/version: ${{ steps.tag_info.outputs.VERSION }}/" pubspec.yaml
          echo "Set version to ${{ steps.tag_info.outputs.VERSION }}"
          grep "^version:" pubspec.yaml

      - name: Configure Gradle for CI
        run: |
          # Override local gradle.properties which requests 8GB (too much for CI runner)
          sed -i 's/-Xmx8G/-Xmx4G/g' android/gradle.properties
          sed -i 's/-XX:MaxMetaspaceSize=4G/-XX:MaxMetaspaceSize=1G/g' android/gradle.properties
          cat android/gradle.properties

      - name: Build signed APK
        run: flutter build apk --release

      - name: Rename APK with version
        run: |
          mkdir -p release
          cp build/app/outputs/flutter-apk/app-release.apk release/FishFeed-${{ steps.tag_info.outputs.TAG_NAME }}.apk
          cp tag_message.txt release/

      - name: Upload files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "release/FishFeed-${{ steps.tag_info.outputs.TAG_NAME }}.apk,release/tag_message.txt"
          target: "${{ secrets.DEPLOY_PATH }}/${{ steps.tag_info.outputs.TAG_NAME }}"
          strip_components: 1

      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ${{ secrets.DEPLOY_PATH }}/${{ steps.tag_info.outputs.TAG_NAME }}
            mv tag_message.txt release-notes.txt
            cd ${{ secrets.DEPLOY_PATH }}
            rm -f latest && ln -s ${{ steps.tag_info.outputs.TAG_NAME }} latest
            echo '{"releases": [' > index.json.tmp
            first=true
            for dir in $(ls -d v* 2>/dev/null | sort -V -r); do
              if [ "$first" = true ]; then
                first=false
              else
                echo ',' >> index.json.tmp
              fi
              notes=""
              if [ -f "$dir/release-notes.txt" ]; then
                notes=$(cat "$dir/release-notes.txt" | head -5 | tr '\n' ' ' | sed 's/"/\\"/g')
              fi
              echo "{\"version\": \"$dir\", \"apk\": \"$dir/FishFeed-$dir.apk\", \"notes\": \"$notes\"}" >> index.json.tmp
            done
            echo ']}' >> index.json.tmp
            mv index.json.tmp index.json

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk-${{ steps.tag_info.outputs.TAG_NAME }}
          path: release/FishFeed-${{ steps.tag_info.outputs.TAG_NAME }}.apk
          retention-days: 90

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: release/FishFeed-${{ steps.tag_info.outputs.TAG_NAME }}.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
